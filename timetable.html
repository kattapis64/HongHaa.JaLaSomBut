<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />

    <title>Aun's Workspace | MWIT Schedule System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --bg-color: #0b1120;
        --text-main: #ffffff;
        --text-sub: #9ca3af;
        --glass-bg: rgba(255, 255, 255, 0.03);
        --glass-border: rgba(255, 255, 255, 0.1);
        --sidebar-inner: #0b1120;
        --sub-info-color: #93c5fd;
        --room-info-color: #9ca3af;
      }

      body.light-mode {
        --bg-color: #f8fafc;
        --text-main: #0f172a;
        --text-sub: #64748b;
        --glass-bg: rgba(255, 255, 255, 0.7);
        --glass-border: rgba(15, 23, 42, 0.1);
        --sidebar-inner: #ffffff;
        --sub-info-color: #1d4ed8;
        --room-info-color: #4b5563;
      }

      body {
        background: var(--bg-color);
        color: var(--text-main);
        font-family: "Inter", "Sarabun", sans-serif;
        transition:
          background 0.3s ease,
          color 0.3s ease;
        /* ลบ display: flex; ออก */
      }

      .glass {
        background: var(--glass-bg);
        backdrop-filter: blur(12px);
        border: 1px solid var(--glass-border);
      }

      @keyframes rainbow-move {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      .rainbow-border {
        position: relative;
        z-index: 0;
        padding: 3px;
        background: linear-gradient(
          45deg,
          #ff0000,
          #ff7300,
          #fffb00,
          #48ff00,
          #00ffd5,
          #002bff,
          #7a00ff,
          #ff00c8,
          #ff0000
        );
        background-size: 400%;
        animation: rainbow-move 8s linear infinite;
        border-radius: 1.5rem;
      }

      .rainbow-inner {
        background: var(--sidebar-inner);
        height: 100%;
        width: 100%;
        border-radius: calc(1.5rem - 3px);
      }

      /* Sidebar ปรับแต่งใหม่ */
      /* แก้ไข Sidebar ให้ซ่อนเป็นค่าเริ่มต้น */
      #left-sidebar {
        width: 18rem;
        flex-shrink: 0;
        position: fixed; /* เปลี่ยนจาก sticky เป็น fixed */
        top: 0;
        left: 0;
        height: 100vh;
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        transform: translateX(-110%); /* ซ่อนไว้ทางซ้าย */
        z-index: 40;
      }

      /* เมื่อมีคลาส .open ให้เลื่อนออกมา */
      #left-sidebar.open {
        transform: translateX(0);
      }

      /* ลบ Media Query อันเก่าที่เกี่ยวกับ #left-sidebar ออกให้หมด */

      table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        table-layout: fixed;
      }

      th {
        background: rgba(59, 130, 246, 0.1);
        color: #60a5fa;
        text-align: center;
        padding: 0.75rem;
        font-size: 1rem;
        border-bottom: 2px solid var(--glass-border);
      }

      td {
        padding: 0.5rem;
        border-bottom: 1px solid var(--glass-border);
        border-right: 1px solid var(--glass-border);
        text-align: center;
        font-size: 1rem;
      }

      td:last-child {
        border-right: none;
      }

      .day-column {
        font-weight: bold;
        background: rgba(255, 255, 255, 0.02);
        color: #60a5fa;
        width: 100px;
      }

      .class-card {
        border-radius: 8px;
        padding: 10px;
        font-weight: bold;
        line-height: 1.4;
        min-height: 110px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 4px;
      }

      .vertical-text {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1px;
        font-size: 0.7rem;
        font-weight: bold;
        color: var(--text-sub);
        line-height: 1;
        opacity: 0.6;
      }

      .spacer-column {
        width: 25px;
        padding: 0 !important;
      }

      .filter-btn {
        padding: 0.5rem 1rem;
        border-radius: 0.75rem;
        font-size: 0.8rem;
        font-weight: bold;
        transition: all 0.2s;
        border: 1px solid var(--glass-border);
        background: var(--glass-bg);
      }

      .filter-btn.active {
        background: #3b82f6;
        color: white;
        border-color: #3b82f6;
        box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
      }

      /* สีกลุ่มวิชา */
      .comp {
        background: rgba(59, 130, 246, 0.15);
        color: #60a5fa;
        border-left: 4px solid #3b82f6;
      }
      .math {
        background: rgba(239, 68, 68, 0.15);
        color: #f87171;
        border-left: 4px solid #ef4444;
      }
      .science {
        background: rgba(34, 197, 94, 0.15);
        color: #4ade80;
        border-left: 4px solid #22c55e;
      }
      .english {
        background: rgba(168, 85, 247, 0.15);
        color: #c084fc;
        border-left: 4px solid #a855f7;
      }
      .thai {
        background: rgba(245, 158, 11, 0.15);
        color: #fbbf24;
        border-left: 4px solid #f59e0b;
      }
      .army {
        background: rgba(2, 82, 33, 0.778);
        color: #ffffff;
        border-left: 4px solid #ffffff;
      }
      .activity {
        background: rgb(255, 0, 234);
        color: #ffffff;
        border-left: 4px solid #ffffff;
      }
      .other {
        background: rgba(107, 114, 128, 0.15);
        color: #9ca3af;
        border-left: 4px solid #6b7280;
      }
    </style>
  </head>

      function toggleSidebar() {
        const sidebar = document.getElementById("left-sidebar");
        const overlay = document.getElementById("overlay");
        sidebar.classList.toggle("open");
        overlay.style.display = sidebar.classList.contains("open")
          ? "block"
          : "none";
      }

      function setFilter(type, val) {
        const btn = event.currentTarget;
        if (type === "grade") {
          currentGrade = val;
          document
            .querySelectorAll(".grade-btn")
            .forEach((b) => b.classList.remove("active"));
        } else if (type === "term") {
          currentTerm = val;
          document
            .querySelectorAll(".term-btn")
            .forEach((b) => b.classList.remove("active"));
        } else if (type === "type") {
          currentType = val;
          document
            .querySelectorAll(".type-btn")
            .forEach((b) => b.classList.remove("active"));
        }
        btn.classList.add("active");
        updateDisplay();
      }

        document.getElementById("current-title").innerText =
