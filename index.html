<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aun's Workspace | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        background: #0b1120;
        color: white;
        font-family: "Inter", sans-serif;
        overflow-x: hidden; /* ป้องกันการเลื่อนแนวนอนตอน Sidebar ขยับ */
      }
      .glass {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      @keyframes rainbow-move {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      .rainbow-border {
        position: relative;
        z-index: 0;
        padding: 3px;
        background: linear-gradient(
          45deg,
          #ff0000,
          #ff7300,
          #fffb00,
          #48ff00,
          #00ffd5,
          #002bff,
          #7a00ff,
          #ff00c8,
          #ff0000
        );
        background-size: 400%;
        animation: rainbow-move 8s linear infinite;
        border-radius: 2.5rem;
        overflow: hidden;
      }

      .rainbow-inner {
        background: #0b1120;
        height: 100%;
        width: 100%;
        border-radius: calc(2.5rem - 3px);
      }

      /* Sidebar Slide Logic */
      #left-sidebar {
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        transform: translateX(-110%);
      }
      #left-sidebar.open {
        transform: translateX(0);
      }

      #overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        z-index: 35; /* อยู่ระหว่าง Main content กับ Sidebar */
        backdrop-filter: blur(4px);
      }
    </style>
  </head>
  <body>
    <div id="dashboard-page" class="h-screen w-screen relative flex flex-col">
      <header class="p-8 flex items-center gap-6 z-20">
        <button
          onclick="toggleSidebar()"
          class="w-12 h-12 glass rounded-xl flex flex-col items-center justify-center gap-1.5 hover:border-blue-500/50 transition z-50 shadow-lg active:scale-95"
        >
          <div class="w-6 h-0.5 bg-blue-400"></div>
          <div class="w-6 h-0.5 bg-blue-400"></div>
          <div class="w-6 h-0.5 bg-blue-400"></div>
        </button>

        <div>
          <h1 class="text-4xl font-extrabold text-white leading-tight">
            สวัสดีครับ, คุณ Aun
          </h1>
          <p class="text-gray-500 text-sm font-medium">
            17 พฤษภาคม 2026 • ระบบจัดการ Workspace ส่วนตัว
          </p>
        </div>
      </header>

      <div id="overlay" onclick="toggleSidebar()"></div>

      <aside id="left-sidebar" class="fixed top-0 left-0 h-full w-80 z-40 p-5">
        <div class="rainbow-border h-full shadow-2xl">
          <div class="rainbow-inner p-8 flex flex-col h-full">
            <div
              class="flex justify-between items-center mb-10 border-b border-white/5 pb-6"
            >
              <div class="flex items-center gap-3">
                <div
                  class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-xs"
                >
                  A
                </div>
                <h2
                  class="text-lg font-bold text-blue-400 tracking-widest uppercase"
                >
                  Workspace
                </h2>
              </div>
              <button
                onclick="toggleSidebar()"
                class="text-gray-500 hover:text-white text-2xl transition"
              >
                &times;
              </button>
            </div>

            <nav class="space-y-4 flex-1 text-sm">
              <a
                href="/"
                class="flex items-center p-4 glass rounded-2xl hover:border-pink-500/50 transition bg-pink-500/5 font-bold text-pink-400"
              >
                <span class="w-2 h-2 bg-pink-500 rounded-full mr-3"></span> Home
              </a>
              <a
                href="./halloffame.html"
                class="flex items-center p-4 glass rounded-2xl hover:border-blue-500/50 transition bg-blue-500/5 font-bold text-blue-400"
              >
                <span class="w-2 h-2 bg-blue-500 rounded-full mr-3"></span> Hall
                of Fame
              </a>
              <a
                href="./schedule.html"
                class="flex items-center p-4 glass rounded-2xl hover:border-amber-500/50 transition bg-amber-500/5 font-bold text-amber-400"
              >
                <span class="w-2 h-2 bg-amber-500 rounded-full mr-3"></span>
                Schedule
              </a>
              <a
                href="./timetable.html"
                class="flex items-center p-4 glass rounded-2xl hover:border-green-500/50 transition bg-green-500/5 font-bold text-green-400"
              >
                <span class="w-2 h-2 bg-green-500 rounded-full mr-3"></span>
                Time Table
              </a>
              <a
                href="./student.html"
                class="flex items-center p-4 glass rounded-2xl hover:border-purple-500/50 transition bg-purple-500/5 font-bold text-purple-400"
              >
                <span class="w-2 h-2 bg-purple-500 rounded-full mr-3"></span>
                Student
              </a>
            </nav>
          </div>
        </div>
      </aside>

      <main class="flex-1 p-10 overflow-y-auto"></main>
    </div>

    <script>
      function toggleSidebar() {
        const sidebar = document.getElementById("left-sidebar");
        const overlay = document.getElementById("overlay");
        sidebar.classList.toggle("open");
        overlay.style.display = sidebar.classList.contains("open")
          ? "block"
          : "none";
      }
    </script>

    <div
      id="crud-modal"
      class="fixed inset-0 z-[60] hidden items-center justify-center p-4"
    >
      <div
        class="absolute inset-0 bg-black/60 backdrop-blur-md"
        onclick="closeModal()"
      ></div>
      <div
        class="glass w-full max-w-md p-8 rounded-[2.5rem] relative z-10 border-white/10 shadow-2xl"
      >
        <h3 id="modal-title" class="text-2xl font-bold mb-6">Action</h3>
        <div id="modal-body" class="space-y-4"></div>
        <div class="mt-8 flex justify-end gap-3">
          <button
            onclick="closeModal()"
            class="px-6 py-2 text-gray-400 hover:text-white transition"
          >
            Cancel
          </button>
          <button
            id="modal-confirm-btn"
            class="px-6 py-2 bg-blue-600 rounded-xl font-bold hover:bg-blue-500 transition"
          >
            Confirm
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
