    <style>
      :root {
        --bg-color: #0b1120;
        --text-main: #ffffff;
        --text-sub: #9ca3af;
        --glass-bg: rgba(255, 255, 255, 0.03);
        --glass-border: rgba(255, 255, 255, 0.1);
        --sidebar-inner: #0b1120;
      }

      body.light-mode {
        --bg-color: #f8fafc;
        --text-main: #0f172a;
        --text-sub: #64748b;
        --glass-bg: rgba(255, 255, 255, 0.7);
        --glass-border: rgba(15, 23, 42, 0.1);
        --sidebar-inner: #ffffff;
      }

      body {
        background: var(--bg-color);
        color: var(--text-main);
        font-family: "Inter", "Sarabun", sans-serif;
        transition:
          background 0.3s ease,
          color 0.3s ease;
      }

      .glass {
        background: var(--glass-bg);
        backdrop-filter: blur(12px);
        border: 1px solid var(--glass-border);
      }

      @keyframes rainbow-move {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      .rainbow-border {
        position: relative;
        z-index: 0;
        padding: 3px;
        background: linear-gradient(
          45deg,
          #ff0000,
          #ff7300,
          #fffb00,
          #48ff00,
          #00ffd5,
          #002bff,
          #7a00ff,
          #ff00c8,
          #ff0000
        );
        background-size: 400%;
        animation: rainbow-move 8s linear infinite;
        border-radius: 1.5rem;
      }

      .rainbow-inner {
        background: var(--sidebar-inner);
        height: 100%;
        width: 100%;
        border-radius: calc(1.5rem - 3px);
      }

      /* Sidebar Navigation */
      #left-sidebar {
        width: 18rem;
        flex-shrink: 0;
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        transform: translateX(-110%);
        z-index: 40;
      }

      #left-sidebar.open {
        transform: translateX(0);
      }
    </style>

    <script>
      function toggleSidebar() {
        const sidebar = document.getElementById("left-sidebar");
        const overlay = document.getElementById("overlay");
        sidebar.classList.toggle("open");
        overlay.style.display = sidebar.classList.contains("open")
          ? "block"
          : "none";
      }

      function toggleTheme() {
        document.body.classList.toggle("light-mode");
        const icon = document.getElementById("theme-icon");
        icon.innerText = document.body.classList.contains("light-mode")
          ? "☀️"
          : "🌙";
      }

      // ─── ฟังก์ชันควบคุม Modal ───
      function openModal(title, description) {
        const modal = document.getElementById("student-modal");
        const modalBox = document.getElementById("modal-box");

        // อัปเดตเนื้อหาตามปุ่มที่กด
        document.getElementById("modal-title").innerText = title;
        document.getElementById("modal-desc").innerText = description;

        // แสดง Modal ด้วยการจัดการ CSS Classes
        modal.classList.remove("opacity-0", "pointer-events-none");
        modalBox.classList.remove("scale-95");
        modalBox.classList.add("scale-100");
      }

      function closeModal() {
        const modal = document.getElementById("student-modal");
        const modalBox = document.getElementById("modal-box");

        // ซ่อน Modal
        modal.classList.add("opacity-0", "pointer-events-none");
        modalBox.classList.remove("scale-100");
        modalBox.classList.add("scale-95");
      }
    </script>
